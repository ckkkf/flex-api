server:
  # 端口
  port: 8081
spring:
  threads:
    virtual:
      enabled: true # 启用虚拟线程
  application:
    name: flex-api
  profiles:
    active: dev
  webflux:
    base-path: /api
  ### r2dbc
  r2dbc:
    url: r2dbc:postgresql://${flexapi.datasource.host}:${flexapi.datasource.port}/${flexapi.datasource.database}
    username: ${flexapi.datasource.username}
    password: ${flexapi.datasource.password}
    # 连接池详细配置
    pool:
      enabled: true
      max-size: 10
      initial-size: 10
      # 增加最大空闲时间，防止 PG 端主动断开导致的“破损连接”
      max-idle-time: 30m
  data:
    # redis配置
    redis:
      # Redis数据库索引（默认为0）
      database: 1
      # Redis服务器地址
      host: ${flexapi.redis.host}
      # Redis服务器连接端口
      port: ${flexapi.redis.port}
      # Redis服务器连接密码（默认为空）
      password: ${flexapi.redis.password}
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 200
          # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池中的最小空闲连接
          min-idle: 0


############## Sa-Token 配置 (文档: https://sa-token.cc) ##############
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: cf_clearance
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  #  timeout: 2592000
  timeout: -1
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: false
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: random-128
  # 是否输出操作日志
  is-log: true

logging:
  level:
    cc.flexapi: debug

springdoc:
  swagger-ui:
    urls:
      - name: runtime
        url: /v3/api-docs
      - name: newapi-api
        url: /openapi/newapi-api.json
      - name: newapi-relay
        url: /openapi/newapi-relay.json
    urlsPrimaryName: runtime
    filter: true


flexapi:
  cors:
    enabled: true
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
      - https://localhost:*
      - https://127.0.0.1:*
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
      - Content-Disposition
      - X-Idempotency-Key
    allow-credentials: true
    max-age: 3600
